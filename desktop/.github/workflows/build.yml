name: Build NexDam Desktop

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build MSI
        run: ./gradlew packageMsi --no-daemon
      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: NexDam-Windows
          path: build/compose/binaries/main/msi/*.msi

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build DEB
        run: ./gradlew packageDeb --no-daemon
      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: NexDam-Linux
          path: build/compose/binaries/main/deb/*.deb
