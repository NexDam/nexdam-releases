name: Release NexDam

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ── Windows .msi ────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build MSI (Windows)
        working-directory: desktop
        run: ./gradlew packageMsi --no-daemon

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexDam-Windows
          path: desktop/build/compose/binaries/main/msi/*.msi

  # ── Linux .deb ──────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build DEB (Linux)
        working-directory: desktop
        run: ./gradlew packageDeb --no-daemon

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexDam-Linux
          path: desktop/build/compose/binaries/main/deb/*.deb

  # ── Android .apk ────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexDam-Android
          path: android/app/build/outputs/apk/release/*.apk

  # ── Crea la GitHub Release con tutti i file ─────────────────
  create-release:
    needs: [build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "NexDam - Ultima versione"
          body: |
            ## 📦 Download NexDam Client

            | Piattaforma | File |
            |---|---|
            | 🪟 Windows | `NexDam-1.0.0.msi` |
            | 🐧 Linux | `nexdam_1.0.0_amd64.deb` |
            | 🤖 Android | `app-release.apk` |

            ### Installazione
            - **Windows**: scarica e lancia il `.msi`
            - **Linux**: `sudo dpkg -i nexdam_1.0.0_amd64.deb`
            - **Android**: scarica e installa l'`.apk`
          files: |
            artifacts/NexDam-Windows/*.msi
            artifacts/NexDam-Linux/*.deb
            artifacts/NexDam-Android/*.apk
          make_latest: true
          draft: false
          prerelease: false
